---
name: build
description: Build Action

inputs:
  uid:
    required: true
    description: Docker User ID
  gid:
    required: true
    description: Docker Group ID

runs:
  using: 'composite'
  steps:
    - name: Clone meta-ar
      shell: bash
      run: |
        # Clone the meta-ar repository
        cd ${{ github.workspace }}/..
        # Check if the directory already exists
        if [ -d "meta-ar" ]; then
          echo "Directory meta-ar already exists. Pulling latest changes."
          cd meta-ar
          git reset --hard origin/main
          git pull origin main
        else
          echo "Directory meta-ar does not exist. Cloning repository."
          git clone git@github.com:Audioreach/meta-ar.git
        fi

    - name: Build Project
      id: build
      shell: bash
      run: |
        # Load the build arguments
        set +xe

        # Apply patch
        git apply ../meta-ar/recipes/audio/audioreach-graphservices/0001-ar_osal-update-msm_audio.h-header-include-path.patch

        # Build inside a docker container
        source ./install/environment-setup-armv8-2a-poky-linux
        autoreconf -Wcross --verbose --install --force --exclude=autopoint
        autoconf --force

        #fetch kernel versio
        kernel_version=$(ls ${{ github.workspace }}/install/sysroots/armv8-2a-poky-linux/usr/lib/modules/)
        ./configure CFLAGS="-Wno-int-conversion" ${{ env.BUILD_ARGS }} --with-sanitized-headers=${{ github.workspace }}/install/sysroots/armv8-2a-poky-linux/usr/lib/modules/${kernel_version}/build/include/uapi/sound/qcom
        # make
        make DESTDIR=${{ github.workspace }}/build install

    - name: Create build.tar 
      id: create_build_tar
      shell: bash
      run: |
        # Create a tarball of the build directory
        tar -czf build.tar -C ${{ github.workspace }}/build .
        echo "Build tar created at ${{ github.workspace }}/build.tar"

    - name: Upload build.tar
      id: upload_build_tar
      uses: actions/upload-artifact@v4
      with:
        name: build.tar
        path: ${{ github.workspace }}/build.tar
        retention-days: 1
